services:
  instagram-media:
    image: nginx:1.27-alpine
    restart: unless-stopped
    volumes:
      - ../../.automation/instagram-media:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - traefik-shared
    labels:
      traefik.enable: "true"
      traefik.docker.network: traefik-shared
      traefik.http.routers.bits-instagram-media.rule: Host(`api.codeastrix.com`) && PathPrefix(`/bitstoday-media/`)
      traefik.http.routers.bits-instagram-media.entrypoints: websecure
      traefik.http.routers.bits-instagram-media.tls: "true"
      traefik.http.routers.bits-instagram-media.priority: "100"
      traefik.http.services.bits-instagram-media.loadbalancer.server.port: "80"

networks:
  traefik-shared:
    external: true
